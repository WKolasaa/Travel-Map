version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://backend:8000
      - NEXT_PUBLIC_MAPCN_STYLE_URL=${NEXT_PUBLIC_MAPCN_STYLE_URL:-}
      - NEXT_PUBLIC_MAPCN_ACCESS_TOKEN=${NEXT_PUBLIC_MAPCN_ACCESS_TOKEN:-}
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/travel_map
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change-me}
      - SESSION_SECRET=${SESSION_SECRET:-change-me-long-random-secret}
      - SESSION_TTL_SECONDS=${SESSION_TTL_SECONDS:-86400}
      - PASSWORD_SALT=${PASSWORD_SALT:-travel-map-salt}
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=travel_map
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
